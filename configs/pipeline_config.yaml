bioasq:
  cache_pubmed: true
  data_dir: data/bioasq
  pubmed_cache_dir: data/pubmed_cache
  pubmed_email: jgibson2@andrew.cmu.edu
  question_types:
  - yesno
  - factoid
  - list
  - summary
  rounds:
  - 1
  - 2
  - 3
  - 4
bm25:
  b: 0.75
  elasticsearch_host: localhost
  elasticsearch_port: 9200
  index_name: medical_docs
  k1: 2.0
  min_score: 0.1
data:
  docs_path: data/processed/bioasq_round_1_docs.jsonl
  embeddings_manifest: runs/embeddings_manifest.json
  embeddings_path: runs/embeddings.npy
  results_path: runs/results.jsonl
  run_manifest: runs/run_manifest.json
encoder:
  backend: medcpt
  batch_size: 32
  device: cpu
  embedding_dim: 768
  model: ncbi/MedCPT-Query-Encoder
evaluation:
  llm_judge:
    aspects:
    - factuality
    - completeness
    - relevance
    - evidence_support
    enabled: true
    model: gpt-4o-mini-2024-07-18
    temperature: 0.0
  metrics:
  - recall@5
  - recall@10
  - recall@20
  - recall@50
  - precision@5
  - precision@10
  - mrr
  - rouge1
  - rouge2
  - rougeL
  - f1@5
  - f1@10
  - f1@20
  - f1@50
faiss:
  index_type: IndexFlatIP
  nprobe: 32
  save_path: runs/faiss.index
fallback:
  use_elasticsearch: false
  use_faiss_only: true
llm:
  max_tokens: 1024
  model: gpt-4o-mini-2024-07-18
  provider: openai
  system_prompt: 'You are a scientific medical assistant designed to synthesize responses
    from specific medical documents. Only use the information provided in the documents
    to answer questions. The first documents should be the most relevant. Do not use
    any other information except for the documents provided. When answering questions,
    always format your response as a JSON object with fields for ''response'', ''used
    PMIDs''. Cite all PMIDs your response is based on in the ''used PMIDs'' field.
    Please think step-by-step before answering questions and provide the most accurate
    response possible. Provide your answer to the question in the ''response'' field.

    '
  temperature: 0.7
logging:
  format: json
  level: INFO
  output_dir: runs/logs
mmr:
  lambda_param: 0.7
  recency_weight: 0.3
  top_k: 10
ner:
  confidence_threshold: 0.7
  enabled: true
  model: hf:d4data/biomedical-ner-all
pipeline:
  name: Medical RAG Pipeline
  seed: 42
  version: 1.0.0
prompt:
  include_citations: true
  include_pub_dates: true
  max_context_tokens: 3000
pubmed:
  api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/
  cache_ttl: 86400
  max_results: 100
  retry_attempts: 3
  retry_delay: 1.0
reranker:
  batch_size: 16
  device: cpu
  model: pritamdeka/S-PubMedBert-MS-MARCO
  top_k: 20
retrieval:
  top_k_dense: 100
  top_k_final: 50
  top_k_sparse: 100
temporal:
  recency_decay: 0.1
  strategy: recency_boost
  time_bucket_windows:
  - 2020-2025
  - 2015-2019
  - 2010-2014
