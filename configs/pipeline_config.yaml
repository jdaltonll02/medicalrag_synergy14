  index_type: IndexFlatIP
  nprobe: 32
  save_path: /data/user_data/jgibson2/bioask_pubmed_dataset/round2_dataruns/faiss.index
fallback:
  use_elasticsearch: false
  use_faiss_only: true

# LLM Configuration
# Provider options: "openai", "gemini", "stub"
# For OpenAI:
#   - Set OPENAI_API_KEY environment variable
#   - Optionally set OPENAI_BASE_URL and OPENAI_PROJECT_ID for custom endpoints
# For Gemini:
#   - Set GOOGLE_API_KEY environment variable  
#   - Optionally set GOOGLE_CLOUD_PROJECT for GCP integration
llm:
  enabled: true
  provider: openai  # Change to "gemini" to use Google Gemini instead
  model: gpt-4o-mini-2024-07-18  # Full model name required for CMU gateway
  temperature: 0.7
  api_key: null  # Will use OPENAI_API_KEY environment variable
  base_url: null  # Will use OPENAI_BASE_URL if set (e.g., CMU AI Gateway)
  project_id: null  # Will use OPENAI_PROJECT_ID if set
  system_prompt: |
    You are a biomedical expert answering BioASQ questions.
    Use ONLY the provided documents.
    Produce a concise, factual answer suitable for BioASQ.
    Do NOT include citations or JSON formatting.

    The following are the types of questions and the answers required: 

    Yes/no questions: These are questions that, strictly speaking, require "yes" or "no" answers, though of course in practice longer answers will often be desirable. For example, "Do CpG islands colocalise with transcription start sites?" is a yes/no question.
    Factoid questions: These are questions that, strictly speaking, require a particular entity name (e.g., of a disease, drug, or gene), a number, or a similar short expression as an answer, though again a longer answer may be desirable in practice. For example, "Which virus is best known as the cause of infectious mononucleosis?" is a factoid question.
    List questions: These are questions that, strictly speaking, require a list of entity names (e.g., a list of gene names), numbers, or similar short expressions as an answer; again, in practice additional information may be desirable. For example, "Which are the Raf kinase inhibitors?" is a list question.
    Summary questions: These are questions that do not belong in any of the previous categories and can only be answered by producing a short text summarizing the most prominent relevant information. For example, "What is the treatment of infectious mononucleosis?" is a summary question.

    Further instructions for answers: 

    For each yes/no question , the exact answer of each participating system will have to be either "yes" or "no". Although the value "" will be used in the feedback files for yes/no questions to indicate that they do not have a golden answer yet, in the submission files the value "" is not axcepted.
    For each factoid question , each participating system will have to return a list* of up to 5 entity names (e.g., up to 5 names of drugs), numbers, or similar short expressions, ordered by decreasing confidence.
    For each list question , each participating system will have to return a single list* of entity names, numbers, or similar short expressions, jointly taken to constitute a single answer (e.g., the most common symptoms of a disease). The returned list will have to contain no more than 100 entries of no more than 100 characters each.
    No exact answers will be returned for summary questions .
    Ideal Answers
    For each question (yes/no, factoid, list, summary), each participating system may also return an ideal answer , i.e., a single paragraph-sized text ideally summarizing the most relevant information from articles and snippets. Each returned "ideal" answer is intended to approximate a short text that a biomedical expert would write to answer the corresponding question (e.g., including prominent supportive information), whereas the "exact" answers are only "yes"/"no" responses, entity names or similar short expressions, or lists of entity names and similar short expressions; and there are no "exact" answers in the case of summary questions. The maximum allowed length of each "ideal" answer is 200 words.


logging:
  format: json
  level: INFO
  output_dir: /data/user_data/jgibson2/bioask_pubmed_dataset/round2_data/runs/logs
mmr:
  lambda_param: 0.7
  recency_weight: 0.3
  top_k: 10
ner:
  confidence_threshold: 0.7
  enabled: true
  model: hf:d4data/biomedical-ner-all
pipeline:
  name: Medical RAG Pipeline
  seed: 42
  version: 1.0.0
prompt:
  include_citations: true
  include_pub_dates: true
  max_context_tokens: 3000
# pubmed:
#   api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/
#   cache_ttl: 86400
#   max_results: 100
#   retry_attempts: 3
#   retry_delay: 1.0
reranker:
  batch_size: 16
  device: cpu
  model: pritamdeka/S-PubMedBert-MS-MARCO
  top_k: 20
retrieval:
  top_k_dense: 100
  top_k_final: 50
  top_k_sparse: 100
temporal:
  enabled: true
  strategy: soft_recency_boost
  recency_decay: 0.05
  hard_filter: false

