bioasq:
  cache_pubmed: true
  data_dir: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/test_data
  pubmed_cache_dir: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/pubmed_cache
  pubmed_email: jgibson2@andrew.cmu.edu
  question_types:
  - yesno
  - factoid
  - list
  - summary
  rounds:
  - 1
  - 2
  - 3
  - 4
bm25:
  b: 0.75
  elasticsearch_host: localhost
  elasticsearch_port: 9200
  index_name: medical_docs_3
  k1: 2.0
  min_score: 0.1
data:
  docs_path: /data/user_data/jgibson2/bioask_pubmed_dataset/json/pubmed_round3_corpus.jsonl
  embeddings_manifest: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/runs/embeddings_manifest.json
  embeddings_path: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/runs/embeddings.npy
  results_path: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/runs/results.jsonl
  run_manifest: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/runs/run_manifest.json
encoder:
  backend: medcpt
  batch_size: 32
  device: cuda
  embedding_dim: 768
  model: ncbi/MedCPT-Query-Encoder
  article_model: ncbi/MedCPT-Article-Encoder
evaluation:
  llm_judge:
    aspects:
    - factuality
    - completeness
    - relevance
    - evidence_support
    enabled: false
    model: gpt-4o-mini-2024-07-18
    temperature: 0.0
  metrics:
  - recall@5
  - recall@10
  - recall@20
  - recall@50
  - precision@5
  - precision@10
  - mrr
  - rouge1
  - rouge2
  - rougeL
  - f1@5
  - f1@10
  - f1@20
  - f1@50
faiss:
  index_type: IndexFlatIP
  nprobe: 32
  save_path: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/runs/faiss.index
fallback:
  use_elasticsearch: true
  use_faiss_only: false

# LLM Configuration
# Provider options: "openai", "gemini", "stub"
# For OpenAI:
#   - Set OPENAI_API_KEY environment variable
#   - Optionally set OPENAI_BASE_URL and OPENAI_PROJECT_ID for custom endpoints
# For Gemini:
#   - Set GOOGLE_API_KEY environment variable  
#   - Optionally set GOOGLE_CLOUD_PROJECT for GCP integration
llm:
  enabled: true
  provider: openai  # Change to "gemini" to use Google Gemini instead
  model: gpt-4o-mini-2024-07-18  # Full model name required for CMU gateway
  temperature: 0.7
  api_key: null  # Will use OPENAI_API_KEY environment variable
  base_url: null  # Will use OPENAI_BASE_URL if set (e.g., CMU AI Gateway)
  project_id: null  # Will use OPENAI_PROJECT_ID if set
  system_prompt: |
    You are a biomedical expert answering BioASQ questions.
    Use ONLY the provided documents to formulate your answers.
    Produce a concise, factual answer suitable for BioASQ submission.

    CRITICAL: Follow these formatting rules EXACTLY based on question type:

    For YES/NO questions:
    - Exact answer MUST be only "yes" or "no" (lowercase, no punctuation)
    - Do NOT include "Yes:" or "No:" prefixes
    - Ideal answer: Brief explanation (2-3 sentences) supporting your yes/no answer

    For FACTOID questions:
    - Exact answer: Name or identify the main entity (drug, gene, disease, etc.)
    - If multiple answers exist, list them separated by commas (max 5)
    - Ideal answer: Detailed explanation with supporting evidence

    For LIST questions:
    - Exact answer: Numbered list of items (one per line)
    - Format: 1. Item name
    - 2. Another item
    - (Continue for all items, max 100 items)
    - Ideal answer: Brief summary of the list context

    For SUMMARY questions:
    - No exact answer required
    - Ideal answer: Paragraph summarizing key information (max 200 words)

    Question types and their definitions:
    - Yes/no: Require "yes" or "no" answer (e.g., "Is X true?")
    - Factoid: Require entity name, number, or short expression (e.g., "Which drug treats X?")
    - List: Require list of entity names or expressions (e.g., "What are the causes of X?")
    - Summary: Require text summary (e.g., "What is the treatment of X?")
    For each list question , each participating system will have to return a single list* of entity names, numbers, or similar short expressions, jointly taken to constitute a single answer (e.g., the most common symptoms of a disease). The returned list will have to contain no more than 100 entries of no more than 100 characters each.
    No exact answers will be returned for summary questions .
    Ideal Answers
    For each question (yes/no, factoid, list, summary), each participating system may also return an ideal answer , i.e., a single paragraph-sized text ideally summarizing the most relevant information from articles and snippets. Each returned "ideal" answer is intended to approximate a short text that a biomedical expert would write to answer the corresponding question (e.g., including prominent supportive information), whereas the "exact" answers are only "yes"/"no" responses, entity names or similar short expressions, or lists of entity names and similar short expressions; and there are no "exact" answers in the case of summary questions. The maximum allowed length of each "ideal" answer is 200 words.


logging:
  format: json
  level: INFO
  output_dir: /data/user_data/jgibson2/bioask_pubmed_dataset/round3_data/runs/logs
mmr:
  lambda_param: 0.7
  recency_weight: 0.3
  top_k: 10
ner:
  confidence_threshold: 0.7
  enabled: true
  model: hf:d4data/biomedical-ner-all
pipeline:
  name: Medical RAG Pipeline
  seed: 42
  version: 1.0.0
prompt:
  include_citations: true
  include_pub_dates: true
  max_context_tokens: 3000
# pubmed:
#   api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/
#   cache_ttl: 86400
#   max_results: 100
#   retry_attempts: 3
#   retry_delay: 1.0
reranker:
  batch_size: 32
  device: cuda
  model: pritamdeka/S-PubMedBert-MS-MARCO
  top_k: 20
retrieval:
  alpha: 0.5
  top_k_dense: 100
  top_k_final: 50
  top_k_sparse: 100
temporal:
  enabled: true
  strategy: soft_recency_boost
  recency_decay: 0.05
  hard_filter: false

